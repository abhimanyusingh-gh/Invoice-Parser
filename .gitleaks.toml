[extend]
useDefault = true

[allowlist]
paths = [
  '''node_modules/''',
  '''\.yarn/''',
  '''dist/''',
  '''build/''',
  '''coverage/''',
  '''\.venv.*''',
  '''__pycache__/''',
  '''\.husky/''',
  '''infra/terraform/\.terraform/''',
]

# Allow known development-only dummy secrets in local config
regexTarget = "line"

[[rules]]
id = "local-dev-secrets"
description = "Allow local dev placeholder secrets"
regex = '''local-dev-.*-secret'''
[rules.allowlist]
regexTarget = "line"
regexes = ['''local-dev-.*-secret''']
